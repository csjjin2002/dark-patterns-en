function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
}

function getQuotas(){try{return JSON.parse(localStorage.getItem("dp_q2")||"{}");}catch(e){return{};}}
function saveQuotas(q){try{localStorage.setItem("dp_q2",JSON.stringify(q));}catch(e){}}
function getSeqCount(q,sid){return q["S"+sid]||0;}
function incSeq(sid){const q=getQuotas();q["S"+sid]=(q["S"+sid]||0)+1;saveQuotas(q);return q;}
function assignSequence(){
  const q=getQuotas();let best=[];let minC=Infinity;
  SEQUENCES.forEach(s=>{const c=getSeqCount(q,s.id);if(c<MAX_PER_SEQ&&c<minC){minC=c;best=[s];}else if(c===minC&&c<MAX_PER_SEQ){best.push(s);}});
  if(!best.length)best=[...SEQUENCES];
  return best[Math.floor(Math.random()*best.length)];
}
